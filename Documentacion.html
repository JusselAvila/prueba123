
<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 8px 0; font-family: var(--font-sans); background: transparent; }
.diagram-container { width: 100%; overflow-x: auto; }
</style>
</head>
<body>
<div class="diagram-container">
<svg width="100%" viewBox="0 0 680 700" role="img">
<title>Diagrama de Clases — Sistema de Eventos</title>
<desc>Clases principales: Usuario, Evento, Inscripcion con DTOs asociados</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="diamond" viewBox="0 0 14 10" refX="0" refY="5" markerWidth="10" markerHeight="8" orient="auto-start-reverse">
<path d="M7 1L13 5L7 9L1 5Z" fill="none" stroke="context-stroke" stroke-width="1.2"/>
</marker>
</defs>

<!-- ========== ENTIDADES PRINCIPALES ========== -->

<!-- Usuario -->
<g>
<rect x="30" y="30" width="190" height="180" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-primary)" stroke-width="1"/>
<rect x="30" y="30" width="190" height="32" rx="4" fill="none"/>
<!-- header separador -->
<line x1="30" y1="62" x2="220" y2="62" stroke="var(--color-border-primary)" stroke-width="0.5"/>
<line x1="30" y1="110" x2="220" y2="110" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<!-- header -->
<text class="th" x="125" y="52" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Usuario</text>
<!-- atributos -->
<text class="ts" x="44" y="80" fill="var(--color-text-secondary)">+ UsuarioId : int</text>
<text class="ts" x="44" y="96" fill="var(--color-text-secondary)">+ Nombre : string</text>
<text class="ts" x="44" y="116" fill="var(--color-text-secondary)">+ Correo : string</text>
<text class="ts" x="44" y="132" fill="var(--color-text-secondary)">+ PasswordHash : string</text>
<text class="ts" x="44" y="148" fill="var(--color-text-secondary)">+ Rol : string</text>
<!-- metodos -->
<text class="ts" x="44" y="168" fill="var(--color-text-primary)">+ Registrar()</text>
<text class="ts" x="44" y="184" fill="var(--color-text-primary)">+ IniciarSesion()</text>
<text class="ts" x="44" y="200" fill="var(--color-text-primary)">+ ObtenerEventos()</text>
</g>

<!-- Evento -->
<g>
<rect x="250" y="30" width="200" height="200" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-primary)" stroke-width="1"/>
<line x1="250" y1="62" x2="450" y2="62" stroke="var(--color-border-primary)" stroke-width="0.5"/>
<line x1="250" y1="126" x2="450" y2="126" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="350" y="52" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Evento</text>
<text class="ts" x="264" y="80" fill="var(--color-text-secondary)">+ EventoId : int</text>
<text class="ts" x="264" y="96" fill="var(--color-text-secondary)">+ UsuarioId : int</text>
<text class="ts" x="264" y="112" fill="var(--color-text-secondary)">+ Nombre : string</text>
<text class="ts" x="264" y="134" fill="var(--color-text-secondary)">+ AforoMaximo : int</text>
<text class="ts" x="264" y="150" fill="var(--color-text-secondary)">+ Fecha : DateTime</text>
<text class="ts" x="264" y="166" fill="var(--color-text-secondary)">+ Categoria : string</text>
<text class="ts" x="264" y="186" fill="var(--color-text-primary)">+ Crear()</text>
<text class="ts" x="264" y="202" fill="var(--color-text-primary)">+ Editar()</text>
<text class="ts" x="264" y="218" fill="var(--color-text-primary)">+ Eliminar()</text>
</g>

<!-- Inscripcion -->
<g>
<rect x="480" y="30" width="185" height="165" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-primary)" stroke-width="1"/>
<line x1="480" y1="62" x2="665" y2="62" stroke="var(--color-border-primary)" stroke-width="0.5"/>
<line x1="480" y1="110" x2="665" y2="110" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="572" y="52" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Inscripcion</text>
<text class="ts" x="494" y="80" fill="var(--color-text-secondary)">+ InscripcionId : int</text>
<text class="ts" x="494" y="96" fill="var(--color-text-secondary)">+ UsuarioId : int</text>
<text class="ts" x="494" y="112" fill="var(--color-text-secondary)">+ EventoId : int</text>
<text class="ts" x="494" y="128" fill="var(--color-text-secondary)">+ FechaInscripcion</text>
<text class="ts" x="494" y="144" fill="var(--color-text-secondary)">+ Asistio : bool</text>
<text class="ts" x="494" y="164" fill="var(--color-text-primary)">+ Inscribir()</text>
<text class="ts" x="494" y="180" fill="var(--color-text-primary)">+ MarcarAsistencia()</text>
</g>

<!-- Relaciones entre entidades -->
<!-- Usuario -> Evento (1..* crea) -->
<line x1="220" y1="80" x2="250" y2="80" stroke="var(--color-text-secondary)" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="234" y="74" text-anchor="middle" fill="var(--color-text-secondary)">1</text>
<text class="ts" x="247" y="96" text-anchor="middle" fill="var(--color-text-secondary)">0..*</text>
<text class="ts" x="234" y="90" text-anchor="middle" fill="var(--color-text-tertiary)">crea</text>

<!-- Usuario -> Inscripcion (1..* tiene) -->
<line x1="125" y1="210" x2="125" y2="270" stroke="var(--color-text-secondary)" stroke-width="1"/>
<line x1="125" y1="270" x2="572" y2="270" stroke="var(--color-text-secondary)" stroke-width="1"/>
<line x1="572" y1="270" x2="572" y2="195" stroke="var(--color-text-secondary)" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="100" y="222" fill="var(--color-text-secondary)">1</text>
<text class="ts" x="545" y="215" fill="var(--color-text-secondary)">0..*</text>

<!-- Evento -> Inscripcion -->
<line x1="450" y1="120" x2="480" y2="120" stroke="var(--color-text-secondary)" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="454" y="114" fill="var(--color-text-secondary)">1</text>
<text class="ts" x="476" y="114" fill="var(--color-text-secondary)">0..*</text>

<!-- ========== DTOs ========== -->
<!-- Separador visual -->
<line x1="20" y1="310" x2="660" y2="310" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="ts" x="340" y="325" text-anchor="middle" fill="var(--color-text-tertiary)">«DTO» — objetos de transferencia de datos</text>

<!-- LoginResponseDTO -->
<g>
<rect x="30" y="340" width="180" height="110" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="5 3"/>
<line x1="30" y1="372" x2="210" y2="372" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
<text class="ts" x="120" y="357" text-anchor="middle" fill="var(--color-text-tertiary)">«DTO»</text>
<text class="th" x="120" y="371" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)" font-size="12">LoginResponseDTO</text>
<text class="ts" x="44" y="394" fill="var(--color-text-secondary)">+ Id : int</text>
<text class="ts" x="44" y="410" fill="var(--color-text-secondary)">+ Nombre : string</text>
<text class="ts" x="44" y="426" fill="var(--color-text-secondary)">+ Rol : string</text>
<text class="ts" x="44" y="442" fill="var(--color-text-tertiary)">— sin PasswordHash</text>
</g>

<!-- EventoListDTO -->
<g>
<rect x="235" y="340" width="195" height="125" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="5 3"/>
<line x1="235" y1="372" x2="430" y2="372" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
<text class="ts" x="332" y="357" text-anchor="middle" fill="var(--color-text-tertiary)">«DTO»</text>
<text class="th" x="332" y="371" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)" font-size="12">EventoListDTO</text>
<text class="ts" x="249" y="394" fill="var(--color-text-secondary)">+ EventoId : int</text>
<text class="ts" x="249" y="410" fill="var(--color-text-secondary)">+ Nombre : string</text>
<text class="ts" x="249" y="426" fill="var(--color-text-secondary)">+ AforoMaximo : int</text>
<text class="ts" x="249" y="442" fill="var(--color-text-secondary)">+ InscritosActuales : int</text>
<text class="ts" x="249" y="458" fill="var(--color-text-tertiary)">— calculado dinámicamente</text>
</g>

<!-- InscripcionDTO -->
<g>
<rect x="455" y="340" width="195" height="125" rx="4" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="5 3"/>
<line x1="455" y1="372" x2="650" y2="372" stroke="var(--color-border-secondary)" stroke-width="0.5"/>
<text class="ts" x="552" y="357" text-anchor="middle" fill="var(--color-text-tertiary)">«DTO»</text>
<text class="th" x="552" y="371" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)" font-size="12">InscripcionDTO</text>
<text class="ts" x="469" y="394" fill="var(--color-text-secondary)">+ InscripcionId : int</text>
<text class="ts" x="469" y="410" fill="var(--color-text-secondary)">+ NombreUsuario : string</text>
<text class="ts" x="469" y="426" fill="var(--color-text-secondary)">+ CorreoUsuario : string</text>
<text class="ts" x="469" y="442" fill="var(--color-text-secondary)">+ Asistio : bool</text>
<text class="ts" x="469" y="458" fill="var(--color-text-tertiary)">— para check-in</text>
</g>

<!-- DTOs flechas (representacion) -->
<line x1="120" y1="340" x2="120" y2="260" stroke="var(--color-border-tertiary)" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<line x1="332" y1="340" x2="332" y2="260" stroke="var(--color-border-tertiary)" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<line x1="552" y1="340" x2="572" y2="200" stroke="var(--color-border-tertiary)" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<!-- Leyenda -->
<g>
<rect x="30" y="510" width="400" height="60" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="ts" x="44" y="528" fill="var(--color-text-secondary)">Relaciones:</text>
<line x1="108" y1="526" x2="140" y2="526" stroke="var(--color-text-secondary)" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="145" y="528" fill="var(--color-text-secondary)">asociación</text>
<line x1="220" y1="526" x2="252" y2="526" stroke="var(--color-border-secondary)" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text class="ts" x="257" y="528" fill="var(--color-text-secondary)">«usa» (DTO)</text>
<text class="ts" x="44" y="556" fill="var(--color-text-secondary)">Multiplicidad:  1 — uno   0..* — muchos</text>
</g>
</svg>
</div>
</body>
</html>
