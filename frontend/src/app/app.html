<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-links">
      <a routerLink="/cartelera" routerLinkActive="active">Cartelera</a>

      @if (estaLogueado()) {
        <a routerLink="/evento/crear" routerLinkActive="active">Crear Evento</a>
        <a routerLink="/mis-eventos" routerLinkActive="active">Mis Eventos</a>
        <a routerLink="/mis-inscripciones" routerLinkActive="active">Mis Inscripciones</a>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/registro" routerLinkActive="active">Registro</a>
      }
    </div>

    @if (estaLogueado()) {
      <div class="sidebar-footer">
        <span class="sidebar-usuario">Hola, {{ nombreUsuarioActual() }}</span>
        <a (click)="cerrarSesion()" class="logout-link">Logout</a>
      </div>
    }
  </nav>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
